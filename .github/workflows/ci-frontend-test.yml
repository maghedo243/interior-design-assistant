name: CI App Test

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**' 
      - '.github/workflows/**'
      - 'package-lock.json' # Also run if the root lock file changes
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/**'
      - 'package-lock.json'

jobs:
  test_app:
    runs-on: ubuntu-latest
    # We'll remove the global 'defaults' and set it per step to be safe
    
    steps:
    - uses: actions/checkout@v4 

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        # Remove 'app/' because the file is at the root
        cache-dependency-path: 'package-lock.json' 

    - name: Install dependencies
      # If your package.json is at the root, run npm ci here
      run: npm ci

    - name: Type Check (Verify Compilation)
      # Run this inside the app folder where the source code is
      run: npx tsc --noEmit
      working-directory: app

    - name: Run Tests
      run: npm test
      working-directory: app
      continue-on-error: true
