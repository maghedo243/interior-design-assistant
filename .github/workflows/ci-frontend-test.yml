name: CI App Test

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**' 
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/**'

jobs:
  test_app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
    - uses: actions/checkout@v4 

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      run: npm ci

    # This verifies that there are no syntax or logic errors in your TypeScript/JS
    - name: Type Check (Verify Compilation)
      run: npx tsc --noEmit

    # Runs Jest tests (usually includes a "renders correctly" test by default)
    - name: Run Tests
      run: npm test
      continue-on-error: true
